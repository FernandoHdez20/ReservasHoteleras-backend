spring:
  application:
    name: gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9000/oauth2/jwks

  cloud:
    loadbalancer:
      enabled: true

    gateway:
      server:
        webflux:
          routes:
            - id: msv-huespedes
              uri: lb://msv-huespedes
              predicates:
                - Path=/api/huespedes/**
              filters:
                - StripPrefix=2

            - id: msv-medicos
              uri: lb://msv-medicos
              predicates:
                - Path=/api/medicos/**
              filters:
                - StripPrefix=2

            - id: msv-citas
              uri: lb://msv-citas
              predicates:
                - Path=/api/citas/**
              filters:
                - StripPrefix=2

server:
  port: 8090

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka