spring:
  application:
    name: gateway
    
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9000/oauth2/jwks

  cloud:
    loadbalancer:
      enabled: true

    gateway:
      server:
        webflux:
          routes:
            - id: msv-huespedes
              uri: lb://msv-huespedes
              predicates:
                - Path=/api/huespedes/**
              filters:
                - StripPrefix=2

            - id: msv-habitaciones
              uri: lb://msv-habitaciones
              predicates:
                - Path=/api/habitaciones/**
              filters:
                - StripPrefix=2

            - id: msv-reservas
              uri: lb://msv-reservas
              predicates:
                - Path=/api/reservas/**
              filters:
                - StripPrefix=2

server:
  port: 8090

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka